[agent]
  # 리소스 활성 상태 측정을 위해 5초 단위 수집 (운영 환경 적용 시 5m으로 변경)
  interval = "5s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  # Thundering Herd 방지를 위한 전송 부하 분산 (테스트 부하를 위해 2초 지정, 운영 시 30s)
  collection_jitter = "2s"
  flush_interval = "5s"
  precision = "1s"
  omit_hostname = false

# 수집 데이터 크기(Payload) 측정을 위한 파일 출력 플러그인
[[outputs.file]]
  files = ["output_payload.json"]
  data_format = "json"

# [화이트리스트 1] 메모리 수집
[[inputs.mem]]

# [화이트리스트 2] 디스크 수집 (root 파티션 전용 및 무관한 fs 제외로 Cardinality 억제)
[[inputs.disk]]
  mount_points = ["/"]
  ignore_fs = ["tmpfs", "devtmpfs", "devfs", "iso9660", "overlay", "aufs", "squashfs"]
